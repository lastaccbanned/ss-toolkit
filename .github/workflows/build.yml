name: Build Windows EXEs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build ss-toolkit.exe  (full menu toolkit)
        run: |
          pyinstaller --onefile --console --name ss-toolkit main.py

      - name: Build collector.exe  (drop on suspect PC)
        run: |
          pyinstaller --onefile --console --name collector collector.py

      - name: Upload ss-toolkit.exe
        uses: actions/upload-artifact@v4
        with:
          name: ss-toolkit-windows
          path: dist/ss-toolkit.exe

      - name: Upload collector.exe
        uses: actions/upload-artifact@v4
        with:
          name: collector-windows
          path: dist/collector.exe
