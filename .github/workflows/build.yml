name: Build Windows EXEs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build ss-toolkit.exe
        run: >
          pyinstaller --onefile --console --name ss-toolkit
          --hidden-import rich
          --hidden-import rich.console
          --hidden-import rich.table
          --hidden-import rich.panel
          --hidden-import rich.box
          --collect-all rich
          main.py

      - name: Build collector.exe
        run: >
          pyinstaller --onefile --console --name collector
          --hidden-import winreg
          --hidden-import ctypes
          --hidden-import struct
          --hidden-import hashlib
          --hidden-import subprocess
          --hidden-import platform
          --hidden-import rich
          --hidden-import rich.console
          --hidden-import rich.table
          --hidden-import rich.panel
          --hidden-import rich.box
          --collect-all rich
          collector.py

      - name: Delete old latest release
        run: gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish release
        run: |
          gh release create latest dist/ss-toolkit.exe dist/collector.exe `
            --title "Latest Build" `
            --notes "## Downloads

          | File | Description |
          |------|-------------|
          | **collector.exe** | Drop on suspect PC during screenshare — auto-collects all evidence |
          | **ss-toolkit.exe** | Full analysis toolkit — run on your own PC |"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
